<body>

<h1 id="header">Index of /var/www/backup/</h1>

<div id="parentDirLinkBox" style="display: block;">
  <a id="parentDirLink" class="icon up" href="../">
    <span id="parentDirText">[parent directory]</span>
  </a>
</div>

<table>
  <thead>
    <tr class="header" id="theader">
      <th id="nameColumnHeader" tabindex="0" role="button">Name</th>
      <th id="sizeColumnHeader" class="detailsColumn" tabindex="0" role="button">
        Size
      </th>
      <th id="dateColumnHeader" class="detailsColumn" tabindex="0" role="button">
        Last Modified
      </th>
    </tr>
  </thead>
  <tbody id="tbody">
  </tbody>
</table>

<script>
function pad(n, len) {
  return String(n).padStart(len, '0');
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randomChoice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' kB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function generateFiles() {
  var now = new Date();
  var todayStr = pad(now.getFullYear(), 4) + pad(now.getMonth() + 1, 2) + pad(now.getDate(), 2);

  var extensions = [
    { ext: '.jpg',  sizeRange: [120000, 8500000] },
    { ext: '.png',  sizeRange: [50000, 6200000] },
    { ext: '.sql',  sizeRange: [15000000, 98000000] },
    { ext: '.zip',  sizeRange: [5000000, 200000000] },
    { ext: '.tar.gz', sizeRange: [8000000, 150000000] },
    { ext: '.pdf',  sizeRange: [200000, 15000000] },
    { ext: '.doc',  sizeRange: [150000, 8000000] },
    { ext: '.xls',  sizeRange: [100000, 6000000] },
    { ext: '.bak',  sizeRange: [10000000, 200000000] },
    { ext: '.env',  sizeRange: [200, 3000] },
    { ext: '.log',  sizeRange: [500000, 50000000] },
  ];

  var descriptiveNames = [
    'database_backup', 'user_data', 'export_orders', 'customer_info',
    'payment_records', 'admin_credentials', 'api_keys', 'server_config',
    'db_dump', 'full_backup', 'sensitive_data', 'internal_docs',
    'salary_2025', 'financial_report', 'passport_scans', 'id_cards',
    'contract_scan', 'medical_records', 'private_photos', 'screenshot',
    'production_db', 'staging_backup', 'logs_export', 'email_archive',
    'chat_history', 'wechat_export', 'bank_statement', 'tax_return'
  ];

  var fileCount = rand(22, 38);
  var files = [];

  var usedNames = {};
  var usedSlots = {};

  for (var i = 0; i < fileCount; i++) {
    var hour = rand(0, 23);
    var min = rand(0, 59);
    var sec = rand(0, 59);
    var ms = rand(0, 999);
    var timeStr = pad(hour, 2) + pad(min, 2) + pad(sec, 2) + pad(ms, 3);

    var slot = hour * 3600 + min * 60 + sec;
    while (usedSlots[slot]) {
      slot = rand(0, 86399);
    }
    usedSlots[slot] = true;
    hour = Math.floor(slot / 3600);
    min = Math.floor((slot % 3600) / 60);
    sec = slot % 60;
    timeStr = pad(hour, 2) + pad(min, 2) + pad(sec, 2) + pad(ms, 3);

    var extInfo = randomChoice(extensions);
    var name = todayStr + timeStr + randomChoice(descriptiveNames);

    while (usedNames[name + extInfo.ext]) {
      name = todayStr + timeStr + randomChoice(descriptiveNames);
    }
    usedNames[name + extInfo.ext] = true;

    var size = rand(extInfo.sizeRange[0], extInfo.sizeRange[1]);
    var sizeStr = formatSize(size);

    var fullName = name + extInfo.ext;
    var ts = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, min, sec).getTime() / 1000;
    var dateStr = pad(now.getFullYear(), 4) + '/' + pad(now.getMonth() + 1, 2) + '/' + pad(now.getDate(), 2) + ' ' + pad(hour, 2) + ':' + pad(min, 2) + ':' + pad(sec, 2);

    files.push({
      name: fullName,
      size: size,
      sizeStr: sizeStr,
      dateTs: ts,
      dateStr: dateStr
    });
  }

  files.sort(function(a, b) { return b.dateTs - a.dateTs; });

  return files;
}

function addRow(name, size, sizeStr, dateTs, dateStr) {
  var tbody = document.getElementById("tbody");
  var row = document.createElement("tr");
  var fileCell = document.createElement("td");
  var link = document.createElement("a");

  link.className = "icon file";
  link.draggable = "true";
  link.innerText = name;
  link.href = name;

  fileCell.dataset.value = name;
  fileCell.appendChild(link);

  row.appendChild(fileCell);

  var sizeCell = document.createElement("td");
  sizeCell.setAttribute("class", "detailsColumn");
  sizeCell.dataset.value = size;
  sizeCell.innerText = sizeStr;
  row.appendChild(sizeCell);

  var dateCell = document.createElement("td");
  dateCell.setAttribute("class", "detailsColumn");
  dateCell.dataset.value = dateTs;
  dateCell.innerText = dateStr;
  row.appendChild(dateCell);

  tbody.appendChild(row);
}

function sortTable(column) {
  var theader = document.getElementById("theader");
  var oldOrder = theader.cells[column].dataset.order || '1';
  oldOrder = parseInt(oldOrder, 10);
  var newOrder = 0 - oldOrder;
  theader.cells[column].dataset.order = newOrder;

  var tbody = document.getElementById("tbody");
  var rows = tbody.rows;
  var list = [];
  for (var i = 0; i < rows.length; i++) {
    list.push(rows[i]);
  }

  list.sort(function(row1, row2) {
    var a = row1.cells[column].dataset.value;
    var b = row2.cells[column].dataset.value;
    if (column === 0) {
      if (a > b) return newOrder;
      if (a < b) return oldOrder;
      return 0;
    }
    a = parseInt(a, 10);
    b = parseInt(b, 10);
    if (isNaN(a)) a = 0;
    if (isNaN(b)) b = 0;
    return a > b ? newOrder : a < b ? oldOrder : 0;
  });

  for (var i = 0; i < list.length; i++) {
    tbody.appendChild(list[i]);
  }
}

function addHandlers(element, column) {
  element.onclick = function() { sortTable(column); };
  element.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      sortTable(column);
      e.preventDefault();
    }
  };
}

window.addEventListener('DOMContentLoaded', function() {
  addHandlers(document.getElementById('nameColumnHeader'), 0);
  addHandlers(document.getElementById('sizeColumnHeader'), 1);
  addHandlers(document.getElementById('dateColumnHeader'), 2);

  var files = generateFiles();
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    addRow(f.name, f.size, f.sizeStr, f.dateTs, f.dateStr);
  }
});
</script>
